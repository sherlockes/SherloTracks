services:
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    container_name: sherlotracks-db
    environment:
      POSTGRES_DB: sherlotracks
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - default

  backend:
    build: ./backend
    restart: unless-stopped
    container_name: sherlotracks-back
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./public:/public
      - .:/repo
      - /home/sherlockes/.ssh:/root/.ssh:ro
      - /home/sherlockes/.gitconfig:/root/.gitconfig:ro
    networks:
      - proxy
      - default

  frontend:
    build: ./frontend
    restart: unless-stopped
    container_name: sherlotracks-front
    env_file: .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - proxy
      - default

volumes:
  postgres_data:

networks:
  proxy:
    external: true

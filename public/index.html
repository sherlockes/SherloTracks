<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SherloTracks - Minisite</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f8fafc; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #f8fafc; cursor: default !important; }
        .ctrl-pressed #map { cursor: crosshair !important; }
        .logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            line-height: 0.8;
            cursor: default;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .logo-1 { font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; color: #0f172a; }
        .logo-2 { font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; color: #FC4C02; }
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 12px;
            color: #334155;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-width: 220px;
        }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #0f172a; text-transform: uppercase; font-weight: 800; }
        .stats { font-size: 12px; color: #64748b; margin-bottom: 15px; font-weight: 500; display: flex; flex-direction: column; gap: 4px; }
        .stats strong { color: #0f172a; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
            padding: 8px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            transition: all 0.2s;
        }
        .btn-full { width: 100%; margin-bottom: 8px; }
        .btn:hover:not(:disabled) { background: #059669; }
        .btn:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover:not(:disabled) { background: #dc2626; }
        .btn-undo { background: #f59e0b; }
        .btn-undo:hover:not(:disabled) { background: #d97706; }
        .leaflet-interactive-point { cursor: pointer !important; }
        .custom-proposal-tooltip { background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
        .custom-proposal-tooltip::before { display: none !important; }
        #chart-container {
            width: 100%;
            height: 120px;
            margin-bottom: 12px;
            display: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="map"></div>

    <div class="logo-container">
        <span class="logo-1">Sherlo</span>
        <span class="logo-2">Tracks</span>
    </div>

    <div class="controls">
        <h2>Creador de Track</h2>
        <div class="stats" id="stats">
            <span>Puntos: <strong id="valPts">0</strong></span>
            <span>Distancia: <strong id="valDist">0 km</strong></span>
            <span>Desnivel: <strong id="valEle">0 m</strong></span>
        </div>
        <div class="btn-row">
            <button class="btn btn-undo" id="btnUndo" disabled title="Deshacer">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            </button>
            <button class="btn btn-clear" id="btnClear" disabled title="Limpiar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
        </div>
        <div id="chart-container">
            <canvas id="elevationChart"></canvas>
        </div>
        <button class="btn btn-full" id="btnDownload" disabled>Descargar GPX</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([40.4168, -3.7038], 6);
    
    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri'
    });
    const voyagerLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    });
    
    // Satélite por defecto
    satelliteLayer.addTo(map);

    L.control.layers({
        "Satélite": satelliteLayer,
        "Mapa Claro": voyagerLayer
    }, null, { position: 'bottomleft' }).addTo(map);

    let currentTrack = []; // Arrays de objetos { lat, lng, ele, dist }
    let pointCircles = [];
    let proposedPoints = [];
    let trackLine = L.polyline([], { color: '#10b981', weight: 4, opacity: 0.9, lineJoin: 'round' }).addTo(map);
    
    let chartInstance = null;

    let calculatedRadius = 25;
    const pointSizePercent = 0.3;

    function updateRadius() {
        const bounds = map.getBounds();
        const width = map.distance(bounds.getSouthWest(), bounds.getSouthEast());
        calculatedRadius = width * (pointSizePercent / 100);
        
        pointCircles.forEach(p => {
            const isProposed = proposedPoints.some(prop => prop.latlng[0] === p.latlng[0] && prop.latlng[1] === p.latlng[1]);
            p.circle.setRadius(isProposed ? calculatedRadius * 1.3 : calculatedRadius);
        });
    }

    map.on('zoomend', updateRadius);

    const valPts = document.getElementById('valPts');
    const valDist = document.getElementById('valDist');
    const valEle = document.getElementById('valEle');
    const btnDownload = document.getElementById('btnDownload');
    const btnClear = document.getElementById('btnClear');
    const btnUndo = document.getElementById('btnUndo');
    const chartContainer = document.getElementById('chart-container');

    function updateChart() {
        if (currentTrack.length < 2) {
            chartContainer.style.display = 'none';
            return;
        }
        
        chartContainer.style.display = 'block';
        const labels = currentTrack.map(pt => (pt.dist / 1000).toFixed(1) + ' km');
        const data = currentTrack.map(pt => pt.ele || 0);

        if (chartInstance) {
            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = data;
            chartInstance.update();
        } else {
            const ctx = document.getElementById('elevationChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Elevación (m)',
                        data: data,
                        borderColor: '#FC4C02',
                        backgroundColor: 'rgba(252, 76, 2, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: true, ticks: { maxTicksLimit: 8, font: { size: 10 } } },
                        y: { display: true, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }
    }

    function updateProposals() {
        pointCircles.forEach(p => {
            if (p.circle.getTooltip()) p.circle.unbindTooltip();
        });
        proposedPoints = [];

        if (currentTrack.length === 0 || pointCircles.length === 0) return;

        const lastPtObj = currentTrack[currentTrack.length - 1];
        const lastLatLng = L.latLng(lastPtObj.lat, lastPtObj.lng);
        const usedCoords = new Set(currentTrack.map(pt => `${pt.lat},${pt.lng}`));
        
        const calculateBearing = (lat2, lon2) => {
            const dLon = lon2 - lastPtObj.lng;
            const dLat = lat2 - lastPtObj.lat;
            return Math.atan2(dLon, dLat) * 180 / Math.PI;
        };

        const getAngleDiff = (a, b) => {
            let diff = Math.abs(a - b) % 360;
            return diff > 180 ? 360 - diff : diff;
        };

        const candidates = pointCircles
            .filter(p => p.isExportedPoint && !usedCoords.has(`${p.latlng[0]},${p.latlng[1]}`))
            .map(p => {
                const dist = lastLatLng.distanceTo(L.latLng(p.latlng[0], p.latlng[1]));
                const bearing = calculateBearing(p.latlng[0], p.latlng[1]);
                return { item: p, distance: dist, bearing: bearing };
            })
            .sort((a, b) => a.distance - b.distance);
        
        const maxProposals = 3;
        const selected = [];
        const skipped = [];
        
        for (const cand of candidates) {
            if (selected.length >= maxProposals) break;
            const isDup = selected.some(sel => getAngleDiff(cand.bearing, sel.bearing) < 30);
            if (!isDup) selected.push(cand);
            else skipped.push(cand);
        }
        
        while (selected.length < maxProposals && skipped.length > 0) {
            selected.push(skipped.shift());
        }
        
        proposedPoints = selected
            .sort((a, b) => a.distance - b.distance)
            .slice(0, maxProposals)
            .map((c, idx) => ({ ...c.item, proposalIndex: idx + 1 }));
    }

    function updateUI() {
        let totalDist = 0;
        let totalEleGain = 0;
        
        if (currentTrack.length > 0) {
            totalDist = currentTrack[currentTrack.length - 1].dist;
            for (let i = 1; i < currentTrack.length; i++) {
                const diff = (currentTrack[i].ele || 0) - (currentTrack[i-1].ele || 0);
                if (diff > 0) totalEleGain += diff;
            }
        }

        valPts.innerText = currentTrack.length;
        valDist.innerText = (totalDist / 1000).toFixed(1) + ' km';
        valEle.innerText = Math.round(totalEleGain) + ' m';

        btnDownload.disabled = currentTrack.length < 2;
        btnClear.disabled = currentTrack.length === 0;
        btnUndo.disabled = currentTrack.length === 0;

        updateProposals();
        
        pointCircles.forEach(p => {
            const coordStr = `${p.latlng[0]},${p.latlng[1]}`;
            const isUsed = currentTrack.some(pt => `${pt.lat},${pt.lng}` === coordStr);
            const proposal = proposedPoints.find(prop => `${prop.latlng[0]},${prop.latlng[1]}` === coordStr);
            
            if (proposal) {
                p.circle.setStyle({ fillColor: '#4f46e5', color: '#3730a3', fillOpacity: 0.9, opacity: 0.9, weight: 2 });
                p.circle.setRadius(calculatedRadius * 1.3);
                if (!p.circle.getTooltip()) {
                    p.circle.bindTooltip(
                        `<span style="font-weight:bold;color:#fff;background-color:#4f46e5;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px">${proposal.proposalIndex}</span>`, 
                        { permanent: true, direction: 'center', className: 'custom-proposal-tooltip', interactive: false }
                    );
                }
            } else if (isUsed) {
                p.circle.setStyle({ fillColor: '#10b981', color: '#047857', fillOpacity: 0.8, opacity: 0.8, weight: 1 });
                p.circle.setRadius(calculatedRadius);
            } else {
                p.circle.setStyle({ fillColor: '#f59e0b', color: '#d97706', fillOpacity: 0.5, opacity: 0.5, weight: 1 });
                p.circle.setRadius(calculatedRadius);
            }
        });

        trackLine.setLatLngs(currentTrack.map(pt => [pt.lat, pt.lng]));
        updateChart();
    }

    function fetchElevation(ptObj) {
        fetch(`https://api.open-meteo.com/v1/elevation?latitude=${ptObj.lat}&longitude=${ptObj.lng}`)
            .then(res => res.json())
            .then(data => {
                if (data.elevation && data.elevation.length > 0) {
                    ptObj.ele = data.elevation[0];
                    updateUI();
                }
            }).catch(() => {});
    }

    function addPointToTrack(latlng) {
        let dist = 0;
        if (currentTrack.length > 0) {
            const lastObj = currentTrack[currentTrack.length - 1];
            const addedDist = L.latLng(lastObj.lat, lastObj.lng).distanceTo(L.latLng(latlng[0], latlng[1]));
            dist = lastObj.dist + addedDist;
        }

        const newPt = { lat: latlng[0], lng: latlng[1], ele: 0, dist: dist };
        currentTrack.push(newPt);
        
        map.panTo(latlng, { animate: true });
        
        const exists = pointCircles.some(p => p.latlng[0] === latlng[0] && p.latlng[1] === latlng[1]);
        if (!exists) {
            const circle = L.circle(latlng, {
                radius: calculatedRadius, fillColor: '#10b981', color: '#047857', weight: 1, fillOpacity: 0.8, opacity: 0.8, className: 'leaflet-interactive-point'
            }).addTo(map).on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                addPointToTrack(latlng);
            });
            pointCircles.push({ latlng: latlng, circle: circle, isExportedPoint: false });
        }
        
        fetchElevation(newPt);
        updateUI();
    }

    btnUndo.addEventListener('click', () => {
        if (currentTrack.length > 0) {
            const lastPt = currentTrack.pop();
            const idx = pointCircles.findIndex(p => p.latlng[0] === lastPt.lat && p.latlng[1] === lastPt.lng && !p.isExportedPoint);
            if (idx > -1) {
                const isStillUsed = currentTrack.some(pt => pt.lat === lastPt.lat && pt.lng === lastPt.lng);
                if (!isStillUsed) {
                    map.removeLayer(pointCircles[idx].circle);
                    pointCircles.splice(idx, 1);
                }
            }
            updateUI();
        }
    });

    btnClear.addEventListener('click', () => {
        currentTrack = [];
        const toRemove = pointCircles.filter(p => !p.isExportedPoint);
        toRemove.forEach(p => map.removeLayer(p.circle));
        pointCircles = pointCircles.filter(p => p.isExportedPoint);
        updateUI();
    });

    btnDownload.addEventListener('click', () => {
        if (currentTrack.length < 2) return;
        let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="SherloTracks Minisite">\n  <trk>\n    <name>Track Personalizado</name>\n    <trkseg>\n';
        currentTrack.forEach(pt => {
            gpx += `      <trkpt lat="${pt.lat}" lon="${pt.lng}">${pt.ele ? `<ele>${pt.ele}</ele>` : ''}</trkpt>\n`;
        });
        gpx += '    </trkseg>\n  </trk>\n</gpx>';
        const blob = new Blob([gpx], { type: 'application/gpx+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `minisite_track_${new Date().getTime()}.gpx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    fetch('points_export.json')
        .then(res => res.json())
        .then(data => {
            if (data.center && data.zoom) map.setView(data.center, data.zoom);
            updateRadius();
            if (data.points && data.points.length > 0) {
                data.points.forEach(pt => {
                    if (pt.geometry && pt.geometry.coordinates) {
                        const latlng = [pt.geometry.coordinates[1], pt.geometry.coordinates[0]];
                        const circle = L.circle(latlng, {
                            radius: calculatedRadius, fillColor: '#f59e0b', color: '#d97706', weight: 1, fillOpacity: 0.5, opacity: 0.5, className: 'leaflet-interactive-point'
                        }).addTo(map).on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            addPointToTrack(latlng);
                        });
                        pointCircles.push({ latlng: latlng, circle: circle, isExportedPoint: true });
                    }
                });
            }
        })
        .catch(err => console.error("Error loading points_export.json", err));

    let isCtrlPressed = false;
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            isCtrlPressed = true;
            document.getElementById('app').classList.add('ctrl-pressed');
        }
        if (e.key === '1' && proposedPoints[0]) addPointToTrack(proposedPoints[0].latlng);
        else if (e.key === '2' && proposedPoints[1]) addPointToTrack(proposedPoints[1].latlng);
        else if (e.key === '3' && proposedPoints[2]) addPointToTrack(proposedPoints[2].latlng);
    });
    
    document.addEventListener('keyup', (e) => {
        if (e.key === 'Control') {
            isCtrlPressed = false;
            document.getElementById('app').classList.remove('ctrl-pressed');
        }
    });
    
    window.addEventListener('blur', () => {
        isCtrlPressed = false;
        document.getElementById('app').classList.remove('ctrl-pressed');
    });

    map.on('click', (e) => {
        if (isCtrlPressed) addPointToTrack([e.latlng.lat, e.latlng.lng]);
    });

</script>
</body>
</html>
